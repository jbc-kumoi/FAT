<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site17</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #ece2cf;
    font-family: "Georgia", "Yu Mincho", serif;
    color: #4a3c2a;
  }
  header.site-header { border-bottom: 1px solid #b8a488; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-size: 18px; letter-spacing: 0.05em; color: #4a3c2a; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 13px; color: #6b5a3f; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #7a1f1f; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  footer.site-footer { border-top: 1px solid #b8a488; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #8a7455;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #8a7455; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #7a1f1f; }
  .card {
    width: 100%;
    max-width: 480px;
    margin: 24px;
    background: #f7f0e2;
    border: 1px solid #b8a488;
    box-shadow: 0 0 0 6px #ece2cf, 0 6px 20px rgba(74, 60, 42, 0.2);
    padding: 40px 40px;
  }
  h1 {
    font-size: 22px;
    text-align: center;
    margin: 0 0 4px;
    letter-spacing: 0.05em;
  }
  .sub {
    text-align: center;
    margin: 0 0 8px;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #8a7455;
  }
  .notice {
    text-align: center;
    margin: 0 0 16px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #7a1f1f;
    border: 2px solid #7a1f1f;
  }
  hr {
    border: none;
    border-top: 1px solid #b8a488;
    margin: 0 0 24px;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 12px;
    margin-bottom: 6px;
    color: #6b5a3f;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #b8a488;
    background: #fffdf7;
    font-size: 14px;
    font-family: inherit;
    color: #4a3c2a;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #7a5c33;
  }
  textarea { resize: vertical; }
  .btn-row { text-align: center; margin-top: 24px; }
  button {
    padding: 10px 36px;
    background: #6b5a3f;
    color: #f7f0e2;
    border: none;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  button:hover { background: #4a3c2a; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #6b5a3f;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">SITE17 GAZETTE</a>
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/contact.html" class="active">コンタクト</a>
    </nav>
  </div>
</header>

<main>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">SITE17 GAZETTE</p>
  <p class="notice">セールスメールの送信はご遠慮いただきますようお願い申し上げます。</p>
  <hr>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site17">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <div class="btn-row">
      <button type="submit">送信</button>
    </div>
  </form>
  <p id="result"></p>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/contact.html">コンタクト</a>
    </nav>
    <p>&copy; 2026 SITE17 GAZETTE</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
