<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SITE04 CORPORATE</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #eef1f5;
    font-family: "Yu Mincho", "Georgia", serif;
    color: #1e293b;
  }
  header.site-header {
    background: #0f2a4a;
    color: #fff;
    padding: 20px 0;
  }
  .site-header-inner {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
    text-align: center;
  }
  .site-header-inner .brand-row h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0.08em; }
  .site-header-inner nav { margin-top: 12px; }
  .site-header-inner nav a { margin: 0 12px; font-size: 12px; color: #9db3cc; text-decoration: none; letter-spacing: 0.05em; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #fff; }
  .wrap { max-width: 640px; margin: 48px auto; padding: 0 24px; text-align: center; }
  .wrap h2 { font-size: 24px; margin: 0 0 16px; color: #0f2a4a; }
  .wrap p.lead { font-size: 14px; color: #475569; line-height: 1.8; max-width: 480px; margin: 0 auto 40px; }
  .features {
    max-width: 640px;
    margin: 0 auto 56px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .feature { background: #fff; border: 1px solid #cbd5e1; padding: 20px; text-align: left; }
  .feature h3 { font-size: 14px; font-weight: 700; margin: 0 0 8px; color: #0f2a4a; }
  .feature p { font-size: 12px; color: #475569; line-height: 1.6; margin: 0; }
  footer.site-footer { background: #0f2a4a; color: #9db3cc; padding: 20px 0; }
  .site-footer-inner {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
    text-align: center;
    font-size: 12px;
  }
  .site-footer-inner nav a { margin: 0 10px; color: #9db3cc; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #fff; }
  .site-footer-inner p { margin: 10px 0 0; }
  @media (max-width: 560px) { .features { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <div class="brand-row"><h1>SITE04 CORPORATE</h1></div>
    <nav>
      <a href="/index.html" class="active">ホーム</a>
      <a href="/blog.html">ブログ</a>    </nav>
  </div>
</header>

<div class="wrap">
  <h2>信頼と実績のパートナーへ</h2>
  <p class="lead">長年の経験を活かし、お客様のビジネス課題に対して最適なソリューションをご提供いたします。</p>
</div>
<div class="features">
  <div class="feature">
    <h3>事業内容</h3>
    <p>各業界に特化したコンサルティングサービスを展開しています。</p>
  </div>
  <div class="feature">
    <h3>沿革</h3>
    <p>創業以来、お客様との信頼関係を第一に事業を続けています。</p>
  </div>
  <div class="feature">
    <h3>採用情報</h3>
    <p>ともに成長できる仲間を募集しております。</p>
  </div>
</div>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>    </nav>
    <p>&copy; 2026 SITE04 CORPORATE</p>
  </div>
</footer>
</body>
</html>
