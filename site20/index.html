<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site20</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, #eaf6ff 0%, #ffffff 100%);
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #274156;
  }
  header.site-header { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid #d6ecfa; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #1c6ea4; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #6b93ab; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #1c6ea4; }
  main { flex: 1; }
  .hero { max-width: 640px; margin: 0 auto; padding: 64px 24px 48px; text-align: center; }
  .hero h1 { font-size: 27px; margin: 0 0 14px; color: #1c6ea4; }
  .hero p { font-size: 14px; color: #4d6c80; line-height: 1.8; }
  .features {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 64px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .feature {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid #d6ecfa;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 8px 20px rgba(100,160,200,0.1);
  }
  .feature h2 { font-size: 14px; font-weight: 600; margin: 0 0 8px; color: #1c6ea4; }
  .feature p { font-size: 12px; color: #4d6c80; line-height: 1.6; margin: 0; }
  footer.site-footer { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-top: 1px solid #d6ecfa; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b93ab;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b93ab; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #1c6ea4; }
  @media (max-width: 640px) { .features { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site20</a>
    <nav>
      <a href="/index.html" class="active">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry.html">お問い合わせ</a>
    </nav>
  </div>
</header>

<main>
  <div class="hero">
    <h1>❄ Site20 へようこそ</h1>
    <p>澄んだ体験と穏やかなひとときをお届けするサービスです。</p>
  </div>
  <div class="features">
    <div class="feature">
      <h2>快適さ</h2>
      <p>細部までこだわった快適な体験をご用意しています。</p>
    </div>
    <div class="feature">
      <h2>清潔感</h2>
      <p>清潔感のあるサービス提供を心がけています。</p>
    </div>
    <div class="feature">
      <h2>丁寧な対応</h2>
      <p>一人ひとりに寄り添った対応をいたします。</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry.html">お問い合わせ</a>
    </nav>
    <p>&copy; 2026 Site20</p>
    <p>広告目的でのご利用はご遠慮ください</p>
  </div>
</footer>
</body>
</html>
