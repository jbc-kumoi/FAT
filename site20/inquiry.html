<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site20</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, #eaf6ff 0%, #ffffff 100%);
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #274156;
  }
  header.site-header { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid #d6ecfa; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #1c6ea4; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #6b93ab; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #1c6ea4; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  footer.site-footer { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-top: 1px solid #d6ecfa; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b93ab;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b93ab; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #1c6ea4; }
  .card {
    width: 100%;
    max-width: 440px;
    margin: 24px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid #d6ecfa;
    border-radius: 20px;
    padding: 38px 34px;
    box-shadow: 0 10px 30px rgba(100, 160, 200, 0.15);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    text-align: center;
    color: #1c6ea4;
  }
  .sub {
    text-align: center;
    margin: 0 0 6px;
    font-size: 13px;
    color: #6b93ab;
  }
  .notice {
    text-align: center;
    margin: 0 0 22px;
    padding: 10px 14px;
    background: #fef2f2;
    border: 1px solid #f3a6a6;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    color: #b91c1c;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1c6ea4;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cfe8f5;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #1c6ea4;
    box-shadow: 0 0 0 3px rgba(28, 110, 164, 0.12);
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #1c6ea4;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #175a86; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #1c6ea4;
    font-weight: 600;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site20</a>
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry.html" class="active">お問い合わせ</a>
    </nav>
  </div>
</header>

<main>
<div class="card">
  <h1>❄ お問い合わせ</h1>
  <p class="sub">Site20 へのご連絡はこちらから。</p>
  <p class="notice">各種ご案内・広告等はお断りしておりますので何卒ご理解ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site20">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry.html">お問い合わせ</a>
    </nav>
    <p>&copy; 2026 Site20</p>
    <p>広告目的でのご利用はご遠慮ください</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
