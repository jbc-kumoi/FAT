<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site21</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f2027 0%, #2c5364 50%, #00c6a2 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 22px;
    padding: 40px 36px;
    color: #fff;
  }
  h1 { font-size: 24px; font-weight: 800; margin: 0 0 6px; }
  .sub { margin: 0 0 6px; font-size: 14px; color: rgba(255,255,255,0.85); }
  .notice {
    margin: 0 0 24px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.95);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 800;
    color: #b91c1c;
  }
  .notice::before { content: "※ "; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #0f2027;
  }
  input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,255,255,0.5); }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 13px;
    background: #00c6a2;
    color: #0f2027;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  button:hover { background: #1de9b6; }
  #result { margin-top: 16px; font-size: 14px; text-align: center; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <h1>Get in touch</h1>
  <p class="sub">Site21 へのお問い合わせはこちらから。</p>
  <p class="notice">誠に勝手ながら、営業活動はご遠慮いただいております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site21">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
