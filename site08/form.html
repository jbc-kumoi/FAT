<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site08</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fef08a;
    font-family: "Comic Sans MS", "Rounded Mplus 1c", -apple-system, sans-serif;
    color: #1f2937;
  }
  header.site-header { background: #fff; border-bottom: 4px solid #1f2937; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 900; font-size: 18px; color: #ec4899; text-decoration: none; }
  .site-header-inner nav a { margin-left: 18px; font-size: 14px; color: #1f2937; text-decoration: none; font-weight: 700; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #ec4899; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  footer.site-footer { background: #fff; border-top: 4px solid #1f2937; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #1f2937;
    flex-wrap: wrap;
    gap: 12px;
    font-weight: 700;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #1f2937; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #ec4899; }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fff;
    border: 4px solid #1f2937;
    border-radius: 24px;
    padding: 32px 30px;
    box-shadow: 8px 8px 0 #1f2937;
  }
  h1 {
    font-size: 26px;
    margin: 0 0 4px;
    color: #ec4899;
    text-align: center;
  }
  .sub {
    text-align: center;
    margin: 0 0 6px;
    font-size: 13px;
    color: #6b7280;
  }
  .notice {
    text-align: center;
    margin: 0 0 20px;
    padding: 8px 14px;
    background: #fecaca;
    border: 3px solid #1f2937;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 900;
    color: #7f1d1d;
  }
  .field {
    margin-bottom: 16px;
    background: #f0f9ff;
    border: 3px solid #1f2937;
    border-radius: 14px;
    padding: 10px 14px;
  }
  .field:nth-child(2) { background: #fce7f3; }
  .field:nth-child(3) { background: #dcfce7; }
  .field:nth-child(4) { background: #fef9c3; }
  .field:nth-child(5) { background: #e0e7ff; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 6px 8px;
    border: 2px solid #1f2937;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px #ec4899;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #ec4899;
    color: #fff;
    border: 3px solid #1f2937;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1f2937;
  }
  button:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #1f2937; }
  #result {
    margin-top: 14px;
    font-size: 14px;
    text-align: center;
    font-weight: 700;
    color: #ec4899;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site08</a>
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/form.html" class="active">問い合わせフォーム</a>
    </nav>
  </div>
</header>

<main>
<div class="card">
  <h1>お問い合わせ★</h1>
  <p class="sub">Site08 に何でも気軽に聞いてね！</p>
  <p class="notice">恐れ入りますが、宣伝目的でのご連絡はご遠慮願います。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site08">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="4"></textarea>
    </div>
    <button type="submit">送信！</button>
  </form>
  <p id="result"></p>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/form.html">問い合わせフォーム</a>
    </nav>
    <p>&copy; 2026 Site08</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
