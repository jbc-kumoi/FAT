<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog - Site18</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fafafa;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1f2937;
  }
  header.site-header { border-bottom: 1px solid #e5e7eb; background: #fff; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #ef4444; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #4b5563; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #ef4444; }
  main { flex: 1; max-width: 680px; margin: 0 auto; padding: 48px 24px; width: 100%; }
  main h1 { font-size: 24px; margin: 0 0 28px; color: #ef4444; }
  .post { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .post time { font-size: 12px; color: #9ca3af; }
  .post h2 { font-size: 15px; margin: 6px 0 8px; color: #ef4444; }
  .post p { font-size: 13px; color: #6b7280; line-height: 1.7; margin: 0; }
  footer.site-footer { border-top: 1px solid #e5e7eb; background: #fff; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b7280;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b7280; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #ef4444; }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site18</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
      <a href="/form.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <h1>Blog</h1>
  <article class="post">
    <time>2026.07.01</time>
    <h2>新キャンペーンを開始しました</h2>
    <p>期間限定のキャンペーンをスタートしました。詳細はぜひご確認ください。</p>
  </article>
  <article class="post">
    <time>2026.06.15</time>
    <h2>お客様の声を集めました</h2>
    <p>ご利用いただいたお客様からの声を一部ご紹介します。</p>
  </article>
  <article class="post">
    <time>2026.05.20</time>
    <h2>ブランドリニューアルのお知らせ</h2>
    <p>より伝わりやすいブランドを目指し、リニューアルを行いました。</p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html">Contact</a>
    </nav>
    <p>&copy; 2026 Site18</p>
  </div>
</footer>
</body>
</html>
