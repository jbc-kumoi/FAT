<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site18</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1f2937;
  }
  header.site-header { border-bottom: 1px solid #e5e7eb; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #ef4444; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #4b5563; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #ef4444; }
  main.split { flex: 1; display: flex; }
  .panel {
    flex: 0 0 38%;
    background: #ef4444;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
  }
  .panel h1 { font-size: 28px; margin: 0 0 12px; }
  .panel p { font-size: 14px; line-height: 1.7; color: #fecaca; margin: 0 0 14px; }
  .panel p.notice {
    font-size: 13px;
    font-weight: 800;
    color: #7f1d1d;
    background: #fff;
    margin: 0;
    padding: 8px 12px;
    border-radius: 6px;
    display: inline-block;
  }
  .form-side {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: #fff;
  }
  .form-inner { width: 100%; max-width: 360px; }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    color: #6b7280;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #ef4444;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #dc2626; }
  #result {
    margin-top: 14px;
    font-size: 13px;
    color: #ef4444;
    font-weight: 600;
  }
  footer.site-footer { border-top: 1px solid #e5e7eb; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b7280;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b7280; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #ef4444; }
  @media (max-width: 720px) {
    main.split { flex-direction: column; }
    .panel { flex: none; padding: 32px; }
    .form-side { padding: 32px; }
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site18</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<main class="split">
<div class="panel">
  <h1>Site18</h1>
  <p>お問い合わせはこちらのフォームから。担当者が内容を確認し、折り返しご連絡いたします。</p>
  <p class="notice">営業さんからのお電話は大変恐縮ですがご遠慮いただいております。</p>
</div>
<div class="form-side">
  <div class="form-inner">
    <form id="contactForm">
      <input type="hidden" name="site_id" value="site18">
      <div class="field">
        <label>会社名</label>
        <input type="text" name="company">
      </div>
      <div class="field">
        <label>お名前（必須）</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>メールアドレス（必須）</label>
        <input type="email" name="email" required>
      </div>
      <div class="field">
        <label>お問い合わせ内容</label>
        <textarea name="message" rows="5"></textarea>
      </div>
      <button type="submit">送信する</button>
    </form>
    <p id="result"></p>
  </div>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html">Contact</a>
    </nav>
    <p>&copy; 2026 Site18</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
