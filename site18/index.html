<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site18</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1f2937;
  }
  .panel {
    flex: 0 0 38%;
    background: #ef4444;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
  }
  .panel h1 { font-size: 28px; margin: 0 0 12px; }
  .panel p { font-size: 14px; line-height: 1.7; color: #fecaca; margin: 0; }
  .form-side {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: #fff;
  }
  .form-inner { width: 100%; max-width: 360px; }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    color: #6b7280;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #ef4444;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #dc2626; }
  #result {
    margin-top: 14px;
    font-size: 13px;
    color: #ef4444;
    font-weight: 600;
  }
  @media (max-width: 720px) {
    body { flex-direction: column; }
    .panel { flex: none; padding: 32px; }
    .form-side { padding: 32px; }
  }
</style>
</head>
<body>
<div class="panel">
  <h1>Site18</h1>
  <p>お問い合わせはこちらのフォームから。担当者が内容を確認し、折り返しご連絡いたします。</p>
</div>
<div class="form-side">
  <div class="form-inner">
    <form id="contactForm">
      <input type="hidden" name="site_id" value="site18">
      <div class="field">
        <label>会社名</label>
        <input type="text" name="company">
      </div>
      <div class="field">
        <label>お名前（必須）</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>メールアドレス（必須）</label>
        <input type="email" name="email" required>
      </div>
      <div class="field">
        <label>お問い合わせ内容</label>
        <textarea name="message" rows="5"></textarea>
      </div>
      <button type="submit">送信する</button>
    </form>
    <p id="result"></p>
  </div>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
