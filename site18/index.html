<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site18</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fafafa;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1f2937;
  }
  header.site-header { border-bottom: 1px solid #e5e7eb; background: #fff; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #ef4444; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #4b5563; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #ef4444; }
  main { flex: 1; }
  .hero { background: #ef4444; color: #fff; padding: 64px 24px; text-align: center; }
  .hero h1 { font-size: 30px; margin: 0 0 14px; }
  .hero p { font-size: 15px; color: #fecaca; max-width: 480px; margin: 0 auto; line-height: 1.8; }
  .features {
    max-width: 960px;
    margin: 0 auto;
    padding: 56px 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .feature { background: #fff; border-radius: 8px; padding: 22px; box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .feature h2 { font-size: 14px; font-weight: 700; margin: 0 0 8px; color: #ef4444; }
  .feature p { font-size: 12px; color: #6b7280; line-height: 1.6; margin: 0; }
  footer.site-footer { border-top: 1px solid #e5e7eb; background: #fff; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b7280;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b7280; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #ef4444; }
  @media (max-width: 640px) { .features { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site18</a>
    <nav>
      <a href="/index.html" class="active">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html">Contact</a>
      <a href="/ad-ng.html">広告NG</a>
    </nav>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Site18 へようこそ</h1>
    <p>大胆でわかりやすいコミュニケーションを大切にしたブランドです。</p>
  </div>
  <div class="features">
    <div class="feature">
      <h2>スピード感</h2>
      <p>素早い対応でお客様をお待たせしません。</p>
    </div>
    <div class="feature">
      <h2>わかりやすさ</h2>
      <p>誰にでも伝わるシンプルな情報発信を心がけています。</p>
    </div>
    <div class="feature">
      <h2>信頼</h2>
      <p>多くのお客様に選ばれ続けています。</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html">Contact</a>
      <a href="/ad-ng.html">広告NG</a>
    </nav>
    <p>&copy; 2026 Site18</p>
  </div>
</footer>
</body>
</html>
