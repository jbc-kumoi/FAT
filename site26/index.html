<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site26</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #9a9a94;
    background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 4px 4px;
    font-family: "Bahnschrift", "Segoe UI", Arial, sans-serif;
    color: #232323;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #e4e2dc;
    border: 3px solid #232323;
    padding: 34px 30px;
    box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
  }
  h1 {
    font-size: 24px;
    font-weight: 800;
    margin: 0 0 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .sub { margin: 0 0 6px; font-size: 12px; color: #4a4a45; text-transform: uppercase; letter-spacing: 0.08em; }
  .notice {
    margin: 0 0 22px;
    padding: 10px 14px;
    background: #f4a300;
    border: 3px solid #232323;
    font-size: 13px;
    font-weight: 800;
    color: #232323;
    text-transform: uppercase;
  }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 9px 10px;
    border: 2px solid #232323;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus { outline: none; background: #fff6e0; }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #232323;
    color: #f4a300;
    border: 2px solid #232323;
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: #f4a300; color: #232323; }
  #result { margin-top: 14px; font-size: 13px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <h1>Contact</h1>
  <p class="sub">SITE26 / INDUSTRIAL</p>
  <p class="notice">なお、勧誘をご遠慮いただきますようお願い申し上げます。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site26">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
