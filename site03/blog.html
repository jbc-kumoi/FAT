<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog - Site03</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #6d28d9 0%, #db2777 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #fff;
  }
  header.site-header { border-bottom: 1px solid rgba(255,255,255,0.25); }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 800; font-size: 18px; color: #fff; text-decoration: none; }
  .site-header-inner nav a { margin-left: 24px; font-size: 14px; color: rgba(255,255,255,0.85); text-decoration: none; font-weight: 600; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #fff; text-decoration: underline; }
  main { flex: 1; max-width: 720px; margin: 0 auto; padding: 56px 24px; width: 100%; }
  main h1 { font-size: 26px; font-weight: 800; margin: 0 0 32px; }
  .post {
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 18px;
  }
  .post time { font-size: 12px; color: rgba(255,255,255,0.7); }
  .post h2 { font-size: 17px; margin: 6px 0 10px; }
  .post p { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.7; margin: 0; }
  footer.site-footer { border-top: 1px solid rgba(255,255,255,0.25); }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: rgba(255,255,255,0.75); text-decoration: none; }
  .site-footer-inner nav a:hover { color: #fff; }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site03</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
      <a href="/contact-form.html">Contact Us</a>
    </nav>
  </div>
</header>

<main>
  <h1>Blog</h1>
  <article class="post">
    <time>2026.07.01</time>
    <h2>新プランをリリースしました</h2>
    <p>より柔軟にご利用いただけるよう、新しいプランをご用意しました。</p>
  </article>
  <article class="post">
    <time>2026.06.15</time>
    <h2>導入事例のご紹介</h2>
    <p>実際にご利用いただいているお客様の声をまとめました。</p>
  </article>
  <article class="post">
    <time>2026.05.20</time>
    <h2>デザインシステムを刷新しました</h2>
    <p>より使いやすいUIを目指してデザインを見直しました。</p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/contact-form.html">Contact Us</a>
    </nav>
    <p>&copy; 2026 Site03</p>
  </div>
</footer>
</body>
</html>
