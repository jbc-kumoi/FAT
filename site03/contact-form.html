<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site03</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #6d28d9 0%, #db2777 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #fff;
  }
  header.site-header { border-bottom: 1px solid rgba(255,255,255,0.25); }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 800; font-size: 18px; color: #fff; text-decoration: none; }
  .site-header-inner nav a { margin-left: 24px; font-size: 14px; color: rgba(255,255,255,0.85); text-decoration: none; font-weight: 600; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #fff; text-decoration: underline; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  footer.site-footer { border-top: 1px solid rgba(255,255,255,0.25); }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: rgba(255,255,255,0.75); text-decoration: none; }
  .site-footer-inner nav a:hover { color: #fff; }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 40px 36px;
    color: #fff;
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 6px;
  }
  .sub {
    margin: 0 0 6px;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
  }
  .notice {
    margin: 0 0 24px;
    padding: 10px 14px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 800;
    color: #be123c;
  }
  .notice::before { content: "※ "; }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1f2937;
  }
  input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.6);
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #6d28d9;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  button:hover { transform: translateY(-1px); }
  #result {
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
    font-weight: 600;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site03</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/contact-form.html" class="active">Contact Us</a>
    </nav>
  </div>
</header>

<main>
<div class="card">
  <h1>Get in touch</h1>
  <p class="sub">Site03 へのお問い合わせはこちらのフォームから。</p>
  <p class="notice">誠に勝手ながら、当社は営業のご連絡はお断りしております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site03">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前 *</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス *</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/contact-form.html">Contact Us</a>
    </nav>
    <p>&copy; 2026 Site03</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
