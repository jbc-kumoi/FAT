<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site16</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f6ff;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1e1b4b;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fff;
    border-radius: 18px;
    padding: 40px 36px;
    box-shadow: 0 20px 40px rgba(79, 70, 229, 0.12);
    border: 1px solid #e0e0fb;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #4f46e5;
    background: #eef2ff;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .sub {
    margin: 0 0 6px;
    font-size: 14px;
    color: #6b7280;
  }
  .notice {
    margin: 0 0 24px;
    padding: 10px 14px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    color: #b91c1c;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #374151;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d9d9f5;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #4338ca; }
  #result {
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
    color: #4f46e5;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <span class="badge">SITE16</span>
  <h1>お問い合わせ</h1>
  <p class="sub">導入や機能に関するご質問はこちらから。</p>
  <p class="notice">広告掲載についてのお問い合わせは受け付けておりませんのでご了承ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site16">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前 *</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス *</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
