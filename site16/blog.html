<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog - Site16</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #f5f6ff;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #1e1b4b;
  }
  header.site-header { background: #fff; border-bottom: 1px solid #e0e0fb; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #4f46e5; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #4b5563; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #4f46e5; }
  main { flex: 1; max-width: 680px; margin: 0 auto; padding: 48px 24px; width: 100%; }
  main h1 { font-size: 24px; margin: 0 0 28px; }
  .post { background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 10px 24px rgba(79,70,229,0.1); border: 1px solid #e0e0fb; }
  .post time { font-size: 12px; color: #9ca3af; }
  .post h2 { font-size: 15px; margin: 6px 0 8px; color: #4f46e5; }
  .post p { font-size: 13px; color: #6b7280; line-height: 1.7; margin: 0; }
  footer.site-footer { background: #fff; border-top: 1px solid #e0e0fb; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #6b7280;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b7280; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #4f46e5; }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site16</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
      <a href="/contact-form.html">Contact Us</a>
    </nav>
  </div>
</header>

<main>
  <h1>Blog</h1>
  <article class="post">
    <time>2026.07.01</time>
    <h2>新機能をリリースしました</h2>
    <p>チームの生産性をさらに高める新機能を追加しました。</p>
  </article>
  <article class="post">
    <time>2026.06.15</time>
    <h2>導入事例: 業務効率化に成功</h2>
    <p>導入企業様の活用事例をインタビュー形式でご紹介します。</p>
  </article>
  <article class="post">
    <time>2026.05.20</time>
    <h2>API連携ガイドを公開</h2>
    <p>外部サービスとの連携方法をまとめたガイドを公開しました。</p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/contact-form.html">Contact Us</a>
    </nav>
    <p>&copy; 2026 Site16</p>
  </div>
</footer>
</body>
</html>
