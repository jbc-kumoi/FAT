<!DOCTYPE html>
<html lang="ja">
<head>

<title>Blog - SITE07</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #0b0b0d;
    font-family: "Times New Roman", "Yu Mincho", serif;
    color: #e8e2d0;
  }
  header.site-header { border-bottom: 1px solid #4a3d24; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-size: 18px; letter-spacing: 0.1em; color: #d8b56a; text-decoration: none; }
  .site-header-inner nav a { margin-left: 24px; font-size: 13px; letter-spacing: 0.05em; color: #8a7854; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #d8b56a; }
  main { flex: 1; max-width: 640px; margin: 0 auto; padding: 64px 24px; width: 100%; }
  main h1 { font-size: 22px; letter-spacing: 0.1em; margin: 0 0 32px; text-align: center; color: #d8b56a; font-weight: 400; }
  .post { border: 1px solid #4a3d24; padding: 22px 26px; margin-bottom: 18px; }
  .post time { font-size: 11px; color: #6b5f47; letter-spacing: 0.1em; }
  .post h2 { font-size: 15px; margin: 8px 0 10px; color: #d8b56a; font-weight: 400; letter-spacing: 0.05em; }
  .post p { font-size: 13px; color: #b3a888; line-height: 1.8; margin: 0; }
  footer.site-footer { border-top: 1px solid #4a3d24; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #6b5f47;
    flex-wrap: wrap;
    gap: 12px;
    letter-spacing: 0.05em;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b5f47; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #d8b56a; }
</style>
</head>
<body>
<header class="site-header">

    <a class="brand" href="/index.html">SITE07</a>

      <a href="/contact.html">Contact</a>

<footer class="site-footer">
