<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SITE10</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #05050a;
    font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
    color: #e6e6ff;
  }
  header.site-header { border-bottom: 1px solid #ff2a9d; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-size: 16px; color: #00e5ff; text-decoration: none; letter-spacing: 0.05em; }
  .site-header-inner nav a { margin-left: 20px; font-size: 13px; color: #8a8ac0; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #ff2a9d; }
  main { flex: 1; }
  .hero { max-width: 640px; margin: 0 auto; padding: 72px 24px 48px; text-align: center; }
  .hero h1 { font-size: 26px; margin: 0 0 14px; color: #00e5ff; text-shadow: 0 0 10px rgba(0,229,255,0.8); letter-spacing: 0.05em; }
  .hero p { font-size: 13px; color: #8a8ac0; line-height: 1.8; }
  .features {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 72px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .feature { background: #0b0b16; border: 1px solid #ff2a9d; border-radius: 8px; padding: 20px; }
  .feature h2 { font-size: 13px; margin: 0 0 8px; color: #ff2a9d; letter-spacing: 0.05em; }
  .feature p { font-size: 12px; color: #8a8ac0; line-height: 1.6; margin: 0; }
  footer.site-footer { border-top: 1px solid #ff2a9d; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #8a8ac0;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #8a8ac0; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #ff2a9d; }
  @media (max-width: 640px) { .features { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">SITE10</a>
    <nav>
      <a href="/index.html" class="active">HOME</a>
      <a href="/blog.html">BLOG</a>
      <a href="https://fat01.vercel.app/contact.html">Inquiry Form</a>
    </nav>
  </div>
</header>

<main>
  <div class="hero">
    <h1>&gt; SITE10.SYS</h1>
    <p>次世代のデジタル体験をお届けするプラットフォームです。最新情報はブログで随時更新中。</p>
  </div>
  <div class="features">
    <div class="feature">
      <h2>Fast</h2>
      <p>圧倒的な速度で処理を実行します。</p>
    </div>
    <div class="feature">
      <h2>Secure</h2>
      <p>強固なセキュリティで安全に運用できます。</p>
    </div>
    <div class="feature">
      <h2>Connect</h2>
      <p>あらゆるシステムとシームレスに連携します。</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">HOME</a>
      <a href="/blog.html">BLOG</a>
      <a href="https://fat01.vercel.app/contact.html">Inquiry Form</a>
    </nav>
    <p>&copy; 2026 SITE10</p>
  </div>
</footer>
</body>
</html>
