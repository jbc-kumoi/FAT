<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site19</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: repeating-linear-gradient(135deg, #0b3d59 0px, #0b3d59 40px, #0e4a6b 40px, #0e4a6b 80px);
    font-family: -apple-system, "Segoe UI", sans-serif;
  }
  header.site-header { background: #fff; border-bottom: 3px solid #0b3d59; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 17px; color: #0b3d59; text-decoration: none; }
  .site-header-inner nav a { margin-left: 20px; font-size: 14px; color: #5c7a8c; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #0b3d59; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .hero-card {
    background: #fff;
    border-radius: 8px;
    padding: 48px 40px;
    max-width: 640px;
    text-align: center;
    box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    border-top: 6px solid #0b3d59;
  }
  .hero-card h1 { font-size: 26px; margin: 0 0 14px; color: #0b3d59; }
  .hero-card h1::before { content: "⚓ "; }
  .hero-card p { font-size: 14px; color: #5c7a8c; line-height: 1.8; margin: 0 0 28px; }
  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: left; }
  .feature h2 { font-size: 13px; font-weight: 700; margin: 0 0 6px; color: #0b3d59; }
  .feature p { font-size: 12px; color: #5c7a8c; line-height: 1.5; margin: 0; }
  footer.site-footer { background: #fff; border-top: 3px solid #0b3d59; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #5c7a8c;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #5c7a8c; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #0b3d59; }
  @media (max-width: 560px) { .features { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site19</a>
    <nav>
      <a href="/index.html" class="active">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry-form.html">お問い合わせフォーム</a>
      <a href="/ad.html">広告はこちら</a>
    </nav>
  </div>
</header>

<main>
  <div class="hero-card">
    <h1>Site19 へようこそ</h1>
    <p>港町から世界へ、確かな品質をお届けする海運関連サービスです。</p>
    <div class="features">
      <div class="feature">
        <h2>安全性</h2>
        <p>厳格な基準に基づいた安全管理を行っています。</p>
      </div>
      <div class="feature">
        <h2>実績</h2>
        <p>長年培った航路網と実績があります。</p>
      </div>
      <div class="feature">
        <h2>サポート</h2>
        <p>24時間体制でお客様をサポートします。</p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/inquiry-form.html">お問い合わせフォーム</a>
      <a href="/ad.html">広告はこちら</a>
    </nav>
    <p>&copy; 2026 Site19</p>
  </div>
</footer>
</body>
</html>
