<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site19</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(135deg, #0b3d59 0px, #0b3d59 40px, #0e4a6b 40px, #0e4a6b 80px);
    font-family: -apple-system, "Segoe UI", sans-serif;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fff;
    border-radius: 8px;
    padding: 36px 34px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    border-top: 6px solid #0b3d59;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    color: #0b3d59;
  }
  h1::before { content: "⚓ "; }
  .sub {
    margin: 0 0 26px;
    font-size: 13px;
    color: #5c7a8c;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #0b3d59;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #b7cbd6;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: #f6fafc;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #0b3d59;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #0b3d59;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #0e4a6b; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #0b3d59;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site19 へのご連絡はこちらから。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site19">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
