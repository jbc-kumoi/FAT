<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site29</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(120deg, #0d0d12 0%, #1a1a2e 50%, #0d0d12 100%);
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #fff;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #14141f;
    border-radius: 18px;
    padding: 38px 34px;
    position: relative;
    overflow: hidden;
    border: 1px solid transparent;
    background-image:
      linear-gradient(#14141f, #14141f),
      linear-gradient(120deg, #ff6ec7, #7afcff, #ffe66d, #ff6ec7);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 25px;
    margin: 0 0 6px;
    text-align: center;
    background: linear-gradient(90deg, #ff6ec7, #7afcff, #ffe66d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .sub { text-align: center; margin: 0 0 6px; font-size: 13px; color: #a9a9c0; }
  .notice {
    text-align: center;
    margin: 0 0 24px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid #ff6ec7;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    color: #ff9ed6;
  }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; margin-bottom: 6px; color: #a9a9c0; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 12px;
    background: #0d0d15;
    border: 1px solid #33334d;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color: #fff;
  }
  input:focus, textarea:focus { outline: none; border-color: #7afcff; box-shadow: 0 0 10px rgba(122,252,255,0.4); }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #ff6ec7, #7afcff);
    color: #0d0d12;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  #result { margin-top: 16px; font-size: 13px; text-align: center; color: #7afcff; }
</style>
</head>
<body>
<div class="card">
  <h1>Contact</h1>
  <p class="sub">✦ SITE29 ✦</p>
  <p class="notice">営業のご連絡はいたしかねますので、ご了承ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site29">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
