<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site14</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #2e1a47 0%, #ff71ce 100%);
    font-family: "Futura", "Trebuchet MS", sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .card {
    position: relative;
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: rgba(15, 5, 30, 0.55);
    border: 2px solid #01cdfe;
    border-radius: 10px;
    padding: 36px 32px;
    box-shadow: 0 0 30px rgba(1, 205, 254, 0.4);
  }
  h1 {
    font-size: 28px;
    text-align: center;
    margin: 0 0 4px;
    color: #05ffa1;
    text-shadow: 2px 2px 0 #ff71ce;
    letter-spacing: 0.05em;
  }
  .sub {
    text-align: center;
    margin: 0 0 8px;
    font-size: 13px;
    color: #01cdfe;
  }
  .notice {
    text-align: center;
    margin: 0 0 24px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #05ffa1;
    border: 2px solid #05ffa1;
    border-radius: 6px;
    text-shadow: 1px 1px 0 #ff71ce;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    margin-bottom: 6px;
    color: #ff71ce;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 9px 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid #01cdfe;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #05ffa1;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #ff71ce;
    color: #2e1a47;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #05ffa1; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #05ffa1;
  }
</style>
</head>
<body>
<div class="card">
  <h1>CONTACT</h1>
  <p class="sub">✧ Site14 ✧</p>
  <p class="notice">訪問販売や勧誘等はご遠慮くださいますようお願いいたします。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site14">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
