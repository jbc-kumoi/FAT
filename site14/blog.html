<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog - Site14</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #2e1a47 0%, #ff71ce 100%);
    font-family: "Futura", "Trebuchet MS", sans-serif;
    color: #fff;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  header.site-header { border-bottom: 1px solid rgba(1,205,254,0.4); position: relative; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-size: 17px; color: #05ffa1; text-decoration: none; text-shadow: 1px 1px 0 #ff71ce; }
  .site-header-inner nav a { margin-left: 20px; font-size: 13px; color: #fff; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #05ffa1; }
  main { flex: 1; max-width: 680px; margin: 0 auto; padding: 56px 24px; width: 100%; position: relative; }
  main h1 { font-size: 26px; margin: 0 0 28px; text-align: center; color: #05ffa1; text-shadow: 2px 2px 0 #ff71ce; }
  .post { background: rgba(15,5,30,0.5); border: 2px solid #01cdfe; border-radius: 10px; padding: 20px 24px; margin-bottom: 18px; }
  .post time { font-size: 12px; color: #d8b4ff; }
  .post h2 { font-size: 15px; margin: 6px 0 8px; color: #ff71ce; }
  .post p { font-size: 13px; color: #f0d9ff; line-height: 1.7; margin: 0; }
  footer.site-footer { border-top: 1px solid rgba(1,205,254,0.4); position: relative; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #d8b4ff;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #d8b4ff; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #05ffa1; }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site14</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
      <a href="/inquiry.html">Inquiry Form</a>
    </nav>
  </div>
</header>

<main>
  <h1>Blog</h1>
  <article class="post">
    <time>2026.07.01</time>
    <h2>新しいビジュアルを公開しました</h2>
    <p>ネオンとグリッドを基調とした新しいビジュアルを公開しました。</p>
  </article>
  <article class="post">
    <time>2026.06.15</time>
    <h2>サウンドトラック配信開始</h2>
    <p>オリジナルサウンドトラックの配信をスタートしました。</p>
  </article>
  <article class="post">
    <time>2026.05.20</time>
    <h2>コミュニティイベント開催</h2>
    <p>ファンのみなさまとつながるイベントを開催しました。</p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/inquiry.html">Inquiry Form</a>
    </nav>
    <p>&copy; 2026 Site14</p>
  </div>
</footer>
</body>
</html>
