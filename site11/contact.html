<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site11</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fafaf8;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
    color: #3a3a35;
  }
  header.site-header { border-bottom: 1px solid #e5e2d8; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 600; font-size: 16px; letter-spacing: 0.06em; color: #2b2b26; text-decoration: none; }
  .site-header-inner nav a { margin-left: 22px; font-size: 13px; color: #6b6b60; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #a9866a; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  footer.site-footer { border-top: 1px solid #e5e2d8; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #8a8a80;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #8a8a80; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #a9866a; }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 32px;
    padding: 48px 40px;
    border-top: 4px solid #a9866a;
  }
  h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
    color: #2b2b26;
  }
  .sub {
    margin: 0 0 8px;
    font-size: 13px;
    color: #8a8a80;
  }
  .notice {
    margin: 0 0 28px;
    padding: 10px 14px;
    background: #fdf2f2;
    border-left: 3px solid #b3402f;
    font-size: 13px;
    font-weight: 700;
    color: #8a3226;
  }
  .field { margin-bottom: 22px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #6b6b60;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 9px 0;
    border: none;
    border-bottom: 1px solid #d8d4cb;
    font-size: 14px;
    font-family: inherit;
    background: transparent;
  }
  input:focus, textarea:focus {
    outline: none;
    border-bottom-color: #a9866a;
  }
  textarea { resize: vertical; }
  button {
    margin-top: 8px;
    padding: 11px 36px;
    background: #2b2b26;
    color: #fafaf8;
    border: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  button:hover { background: #a9866a; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    color: #6b6b60;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">Site11</a>
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/contact.html" class="active">問い合わせ</a>
    </nav>
  </div>
</header>

<main>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site11 — シンプルにご連絡ください。</p>
  <p class="notice">誠に勝手ながら、当社は営業目的のお問い合わせについてはお断りしております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site11">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">ホーム</a>
      <a href="/blog.html">ブログ</a>
      <a href="/contact.html">問い合わせ</a>
    </nav>
    <p>&copy; 2026 Site11</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
