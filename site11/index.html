<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site11</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafaf8;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
    color: #3a3a35;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 32px;
    padding: 48px 40px;
    border-top: 4px solid #a9866a;
  }
  h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
    color: #2b2b26;
  }
  .sub {
    margin: 0 0 32px;
    font-size: 13px;
    color: #8a8a80;
  }
  .field { margin-bottom: 22px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #6b6b60;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 9px 0;
    border: none;
    border-bottom: 1px solid #d8d4cb;
    font-size: 14px;
    font-family: inherit;
    background: transparent;
  }
  input:focus, textarea:focus {
    outline: none;
    border-bottom-color: #a9866a;
  }
  textarea { resize: vertical; }
  button {
    margin-top: 8px;
    padding: 11px 36px;
    background: #2b2b26;
    color: #fafaf8;
    border: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  button:hover { background: #a9866a; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    color: #6b6b60;
  }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site11 — シンプルにご連絡ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site11">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
