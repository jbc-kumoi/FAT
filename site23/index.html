<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site23</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f2ede1;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    color: #2f2a24;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fbf8f1;
    border: 1px solid #c9bfa8;
    box-shadow: 0 8px 24px rgba(47,42,36,0.1);
    padding: 44px 40px;
    position: relative;
  }
  .card::after {
    content: "";
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px solid #d8cdb0;
    pointer-events: none;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 6px;
    text-align: center;
    letter-spacing: 0.15em;
    color: #7a2d2d;
  }
  .sub { margin: 0 0 6px; font-size: 12px; text-align: center; color: #8a7f6a; letter-spacing: 0.1em; }
  .notice {
    margin: 0 0 24px;
    padding: 10px 14px;
    text-align: center;
    background: #fbecec;
    border: 1px solid #b3402f;
    font-size: 13px;
    font-weight: 700;
    color: #8a3226;
  }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; margin-bottom: 6px; color: #6b5f4a; letter-spacing: 0.05em; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #c9bfa8;
    background: #fffdf8;
    font-size: 14px;
    font-family: inherit;
    color: #2f2a24;
  }
  input:focus, textarea:focus { outline: none; border-color: #7a2d2d; }
  textarea { resize: vertical; }
  .btn-row { text-align: center; margin-top: 24px; }
  button {
    padding: 10px 40px;
    background: #7a2d2d;
    color: #fbf8f1;
    border: none;
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: pointer;
  }
  button:hover { background: #5c2222; }
  #result { margin-top: 16px; font-size: 13px; text-align: center; color: #7a2d2d; }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">SITE23</p>
  <p class="notice">セールス電話はお断りしておりますのでご遠慮ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site23">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <div class="btn-row">
      <button type="submit">送信</button>
    </div>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
