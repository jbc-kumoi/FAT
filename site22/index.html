<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site22</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #061a06;
    font-family: "Courier New", "SFMono-Regular", monospace;
    color: #33ff33;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0px, rgba(0,0,0,0.25) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }
  .card {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 24px;
    background: #0a230a;
    border: 2px solid #33ff33;
    border-radius: 4px;
    padding: 32px 30px;
    box-shadow: 0 0 20px rgba(51,255,51,0.35) inset, 0 0 20px rgba(51,255,51,0.2);
  }
  h1 { font-size: 18px; margin: 0 0 4px; text-shadow: 0 0 6px #33ff33; }
  h1::before { content: "> "; }
  .sub { margin: 0 0 4px; font-size: 13px; color: #1fa81f; }
  .notice {
    margin: 0 0 22px;
    padding: 8px 12px;
    background: #1a0505;
    border: 1px solid #ff4444;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 700;
    color: #ff5555;
  }
  .notice::before { content: "!! "; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; margin-bottom: 6px; color: #1fa81f; }
  label::before { content: "$ "; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 9px 10px;
    background: #061a06;
    border: 1px solid #1fa81f;
    border-radius: 2px;
    font-size: 13px;
    font-family: inherit;
    color: #33ff33;
  }
  input:focus, textarea:focus { outline: none; border-color: #33ff33; box-shadow: 0 0 6px rgba(51,255,51,0.6); }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 11px;
    background: #33ff33;
    color: #061a06;
    border: none;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  button:hover { background: #66ff66; }
  #result { margin-top: 14px; font-size: 13px; text-align: center; color: #33ff33; }
</style>
</head>
<body>
<div class="card">
  <h1>contact.exe --site22</h1>
  <p class="sub">// あなたのメッセージを送信してください</p>
  <p class="notice">勧誘行為はお断りしておりますので、あらかじめご了承ください。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site22">
    <div class="field">
      <label>company</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>name (required)</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>email (required)</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>message</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">RUN send()</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
