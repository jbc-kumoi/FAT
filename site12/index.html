<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site12</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fef200;
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    color: #000;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fff;
    border: 5px solid #000;
    padding: 32px 28px;
  }
  h1 {
    font-size: 30px;
    font-weight: 900;
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  .sub {
    margin: 0 0 24px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    background: #000;
    color: #fef200;
    display: inline-block;
    padding: 3px 8px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px;
    border: 3px solid #000;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    background: #fef200;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 14px;
    background: #000;
    color: #fef200;
    border: 3px solid #000;
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: #fef200; color: #000; }
  #result {
    margin-top: 14px;
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Contact</h1>
  <p class="sub">SITE12</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site12">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前 必須</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス 必須</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">SEND</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
