<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site13</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e6e7ee;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #44475a;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #e6e7ee;
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 8px 8px 16px #c7c8d1, -8px -8px 16px #ffffff;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
    text-align: center;
  }
  .sub {
    margin: 0 0 6px;
    font-size: 13px;
    text-align: center;
    color: #6b6e85;
  }
  .notice {
    margin: 0 0 24px;
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #d6336c;
    background: #e6e7ee;
    border-radius: 14px;
    box-shadow: inset 3px 3px 6px #c7c8d1, inset -3px -3px 6px #ffffff;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #55586b;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 12px 14px;
    border: none;
    border-radius: 14px;
    background: #e6e7ee;
    box-shadow: inset 4px 4px 8px #c7c8d1, inset -4px -4px 8px #ffffff;
    font-size: 14px;
    font-family: inherit;
    color: #3a3c4a;
  }
  input:focus, textarea:focus { outline: none; }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 13px;
    margin-top: 6px;
    background: #e6e7ee;
    color: #5b5fef;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 6px 6px 12px #c7c8d1, -6px -6px 12px #ffffff;
  }
  button:active {
    box-shadow: inset 4px 4px 8px #c7c8d1, inset -4px -4px 8px #ffffff;
  }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #5b5fef;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site13 へのご連絡はこちらから</p>
  <p class="notice">平素よりお世話になっております。営業に関するお問い合わせはお断りしております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site13">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
