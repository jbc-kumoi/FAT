<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site27</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,183,197,0.55), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(163,209,255,0.5), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(200,255,214,0.5), transparent 45%),
      #fdfaf6;
    font-family: "Segoe Print", "Hiragino Maru Gothic ProN", -apple-system, sans-serif;
    color: #4a4458;
  }
  .card {
    width: 100%;
    max-width: 440px;
    margin: 24px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    border-radius: 28px;
    padding: 38px 34px;
    box-shadow: 0 16px 40px rgba(120,100,140,0.15);
  }
  h1 { font-size: 24px; margin: 0 0 4px; text-align: center; color: #a970c9; }
  .sub { text-align: center; margin: 0 0 6px; font-size: 13px; color: #8a7f9a; }
  .notice {
    text-align: center;
    margin: 0 0 24px;
    padding: 10px 14px;
    background: rgba(255,183,197,0.35);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    color: #b3402f;
  }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #6d6285; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d8c8e8;
    border-radius: 14px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus { outline: none; border-color: #a970c9; }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #a970c9;
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #bd8ad6; }
  #result { margin-top: 14px; font-size: 13px; text-align: center; color: #a970c9; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site27 へのご連絡はこちらから</p>
  <p class="notice">誠に勝手ながら、セールスはお控えいただいております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site27">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
