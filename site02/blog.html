<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog - site02</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #0f1115;
    font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
    color: #d1d5db;
  }
  header.site-header { background: #16181d; border-bottom: 1px solid #2a2e37; }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-header-inner .brand { font-weight: 700; font-size: 16px; color: #4ade80; text-decoration: none; }
  .site-header-inner nav a { margin-left: 24px; font-size: 13px; color: #9ca3af; text-decoration: none; }
  .site-header-inner nav a:hover, .site-header-inner nav a.active { color: #4ade80; }
  main { flex: 1; max-width: 680px; margin: 0 auto; padding: 56px 24px; width: 100%; }
  main h1 { font-size: 18px; margin: 0 0 28px; color: #4ade80; }
  main h1::before { content: "$ "; color: #6b7280; }
  .post { background: #16181d; border: 1px solid #2a2e37; border-radius: 6px; padding: 20px 24px; margin-bottom: 16px; }
  .post time { font-size: 11px; color: #6b7280; }
  .post h2 { font-size: 14px; margin: 6px 0 8px; color: #e5e7eb; }
  .post p { font-size: 13px; color: #9ca3af; line-height: 1.7; margin: 0; }
  footer.site-footer { background: #16181d; border-top: 1px solid #2a2e37; }
  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #6b7280;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-footer-inner nav a { margin-right: 16px; color: #6b7280; text-decoration: none; }
  .site-footer-inner nav a:hover { color: #4ade80; }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/index.html">site02</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
      <a href="/form.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <h1>changelog</h1>
  <article class="post">
    <time>2026.07.01</time>
    <h2>v2.3.0 をリリースしました</h2>
    <p>パフォーマンス改善とバグ修正を含むアップデートです。詳細は次回の記事でご紹介します。</p>
  </article>
  <article class="post">
    <time>2026.06.15</time>
    <h2>導入事例: 開発チームでの活用</h2>
    <p>実際にご利用いただいているチームの活用方法をまとめました。</p>
  </article>
  <article class="post">
    <time>2026.05.20</time>
    <h2>ドキュメントを更新しました</h2>
    <p>よくいただくご質問をもとに、ドキュメントの内容を整理・追加しました。</p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/form.html">Contact</a>
    </nav>
    <p>&copy; 2026 site02</p>
  </div>
</footer>
</body>
</html>
