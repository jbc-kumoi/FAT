<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site15</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f4ea;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
    color: #33422d;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #fff;
    border-radius: 28px 8px 28px 8px;
    padding: 40px 36px;
    box-shadow: 0 12px 30px rgba(74, 99, 58, 0.12);
  }
  h1 {
    font-size: 24px;
    margin: 0 0 4px;
    color: #4a7c3f;
  }
  h1::before { content: "🌿 "; }
  .sub {
    margin: 0 0 28px;
    font-size: 13px;
    color: #7c8f70;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #4a7c3f;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #cddabf;
    border-radius: 14px 4px 14px 4px;
    font-size: 14px;
    font-family: inherit;
    background: #f8faf4;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #4a7c3f;
  }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #4a7c3f;
    color: #fff;
    border: none;
    border-radius: 14px 4px 14px 4px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #3e6a34; }
  #result {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    color: #4a7c3f;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site15 へのご相談はこちらから。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site15">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
