<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site30</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #000;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #000;
    color: #fff;
    border: 6px solid #000;
    padding: 36px 32px;
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    margin: 0 0 4px;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .sub { margin: 0 0 10px; font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 0.1em; }
  .notice {
    margin: 0 0 22px;
    padding: 10px 12px;
    background: #fff;
    color: #000;
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
  }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; color: #ccc; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #fff;
    background: #000;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; background: #111; }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: 2px solid #fff;
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: #ccc; }
  #result { margin-top: 14px; font-size: 13px; font-weight: 700; color: #fff; }
</style>
</head>
<body>
<div class="card">
  <h1>Contact</h1>
  <p class="sub">SITE30</p>
  <p class="notice">無断でのご連絡には損害賠償を請求する場合がございます。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site30">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">SEND</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
