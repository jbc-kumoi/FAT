<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ - Site25</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1d3324;
    background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 6px 6px;
    font-family: "Comic Sans MS", "Segoe Print", cursive, sans-serif;
    color: #f5f0e6;
  }
  .card {
    width: 100%;
    max-width: 460px;
    margin: 24px;
    background: #24402c;
    border: 10px solid #6b4a2f;
    border-radius: 6px;
    padding: 32px 30px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  }
  h1 { font-size: 26px; margin: 0 0 6px; text-align: center; }
  .sub { text-align: center; margin: 0 0 6px; font-size: 13px; color: #cfe8d6; }
  .notice {
    margin: 0 0 22px;
    padding: 10px 14px;
    text-align: center;
    border: 2px dashed #ffde59;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    color: #ffde59;
  }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; margin-bottom: 6px; color: #cfe8d6; }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 8px 10px;
    background: transparent;
    border: 2px solid #cfe8d6;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    color: #f5f0e6;
  }
  input:focus, textarea:focus { outline: none; border-color: #ffde59; }
  textarea { resize: vertical; }
  button {
    width: 100%;
    padding: 12px;
    background: #ffde59;
    color: #24402c;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #ffe985; }
  #result { margin-top: 14px; font-size: 13px; text-align: center; color: #ffde59; }
</style>
</head>
<body>
<div class="card">
  <h1>お問い合わせ</h1>
  <p class="sub">Site25 へのご連絡はこちらから</p>
  <p class="notice">誠に恐れ入りますが、営業目的でのご利用はお控えいただいております。</p>
  <form id="contactForm">
    <input type="hidden" name="site_id" value="site25">
    <div class="field">
      <label>会社名</label>
      <input type="text" name="company">
    </div>
    <div class="field">
      <label>お名前（必須）</label>
      <input type="text" name="name" required>
    </div>
    <div class="field">
      <label>メールアドレス（必須）</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5"></textarea>
    </div>
    <button type="submit">送信する</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  button.style.display = 'none';

  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('result').textContent = res.ok ? '送信完了しました' : '送信に失敗しました';
});
</script>
</body>
</html>
